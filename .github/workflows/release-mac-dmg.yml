# Manual run: Actions → Release macOS DMG → Run workflow.
#
# Branch: use the "Use workflow from" dropdown (branch or tag) — that ref is
# checked out and is what gets tagged / released. The workflow file must exist on that ref.
#
# Access: only GitHub usernames listed in check-allowed-actor are allowed to run this
# (others get an immediate failed job). Adjust the allowlist in that job as needed.
#
# Creates tag v<version> at the selected ref, GitHub Release with fixed title, DMG attached.
# Does not modify package.json / tauri.conf.json / Cargo.toml versions.

name: Release macOS DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver only, no "v" (e.g. 1.2.0)'
        required: true
        type: string

env:
  # Shown as the GitHub Release title for every run (tag still carries the version).
  RELEASE_TITLE: Pinnacle Prep Stats (mac)

jobs:
  check-allowed-actor:
    name: Allowed runner only
    runs-on: ubuntu-latest
    steps:
      - name: Verify GitHub user
        run: |
          # Exact GitHub login(s) allowed to run this workflow (add more lines as needed).
          allowed_users=(
            jettneubacher
          )
          actor="${{ github.actor }}"
          for u in "${allowed_users[@]}"; do
            if [ "$u" = "$actor" ]; then
              echo "Allowed: $actor"
              exit 0
            fi
          done
          echo "::error::Only allowlisted users may run this workflow (you are: $actor)."
          exit 1

  build-and-release:
    needs: check-allowed-actor
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install

      - name: Build DMG
        run: bun run tauri build --ci -b dmg --no-sign

      - name: Create GitHub Release and upload DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ env.RELEASE_TITLE }}
          files: src-tauri/target/release/bundle/dmg/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
